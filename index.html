<!DOCTYPE html>
<html lang="es" class="gate-pending">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Juegos</title>
<link rel="icon" type="image/png" href="./favicon-192.png">
<link rel="shortcut icon" href="./favicon.ico">
<style>
  :root{
    --bg:#060608;
    --bg-elev:#0d0d13;
    --line:rgba(255,255,255,0.08);
    --ink:#eef2f5;
    --ink-dim:#8b95a1;
    --radius:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;min-height:100%;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body{
    display:flex;flex-direction:column;align-items:center;
    padding:64px 20px 80px;
  }
  .wrap{width:100%;max-width:920px;}

  /* header */
  header{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:56px;}
  .logo{
    width:56px;height:56px;object-fit:contain;
    filter:drop-shadow(0 0 18px rgba(120,140,255,0.35));
    margin-bottom:22px;
    opacity:0;transform:translateY(6px);
    animation:rise .6s ease forwards;
  }
  .eyebrow{
    font-family:ui-monospace,"SF Mono","Cascadia Code",monospace;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-dim);margin-bottom:14px;
    opacity:0;transform:translateY(6px);
    animation:rise .6s ease .08s forwards;
  }
  h1{
    font-size:clamp(30px,6vw,46px);font-weight:800;letter-spacing:-0.02em;
    line-height:1.1;margin-bottom:14px;
    opacity:0;transform:translateY(6px);
    animation:rise .6s ease .14s forwards;
  }
  .sub{
    font-size:15px;color:var(--ink-dim);max-width:440px;line-height:1.55;
    opacity:0;transform:translateY(6px);
    animation:rise .6s ease .2s forwards;
  }
  @keyframes rise{to{opacity:1;transform:translateY(0);}}

  /* grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:18px;
  }
  .card{
    position:relative;
    display:flex;flex-direction:column;
    background:var(--bg-elev);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    text-decoration:none;color:inherit;
    transition:border-color .2s ease, transform .2s ease, box-shadow .2s ease;
    opacity:0;transform:translateY(10px);
    animation:rise .6s ease forwards;
  }
  .card:hover{transform:translateY(-3px);}
  .card:hover, .card:focus-visible{
    border-color:var(--accent);
    box-shadow:0 0 0 1px var(--accent) inset, 0 12px 32px -12px var(--accent-glow);
  }
  .card:focus-visible{outline:2px solid var(--accent);outline-offset:3px;}

  .preview{
    display:block;width:100%;height:150px;
    background:
      radial-gradient(circle at 30% 20%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 60%),
      #08080c;
  }

  .body{padding:20px 22px 22px;display:flex;flex-direction:column;gap:10px;}
  .title{
    font-size:19px;font-weight:800;letter-spacing:.01em;
  }
  .tagline{font-size:13.5px;color:var(--ink-dim);line-height:1.5;}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;}
  .chip{
    font-family:ui-monospace,"SF Mono","Cascadia Code",monospace;
    font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--accent);
    background:color-mix(in srgb, var(--accent) 14%, transparent);
    border:1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    padding:4px 9px;border-radius:20px;
  }
  .play{
    margin-top:8px;
    font-family:ui-monospace,"SF Mono","Cascadia Code",monospace;
    font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
    color:var(--accent);display:flex;align-items:center;gap:6px;
  }
  .play svg{width:12px;height:12px;transition:transform .2s ease;}
  .card:hover .play svg{transform:translateX(3px);}

  @media (prefers-reduced-motion: reduce){
    .logo,.eyebrow,h1,.sub,.card{animation:none;opacity:1;transform:none;}
  }

  /* gate: mientras se resuelve la identidad, el contenido queda oculto (sin flash) */
  .gate-pending .wrap{display:none;}

  .whoami-pill{
    display:flex;align-items:center;gap:8px;
    font-family:ui-monospace,"SF Mono","Cascadia Code",monospace;
    font-size:11px;color:var(--ink-dim);letter-spacing:.03em;
    margin-top:18px;
    opacity:0;transform:translateY(6px);
    animation:rise .6s ease .24s forwards;
  }
  .whoami-pill b{color:var(--ink);font-weight:700;}
  .whoami-pill a{color:var(--ink-dim);text-decoration:underline;cursor:pointer;}
  .whoami-pill a:hover{color:var(--ink);}

  .gate-overlay{
    position:fixed;inset:0;z-index:80;
    background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  .gate-card{
    width:100%;max-width:360px;
    background:var(--bg-elev);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:28px 24px;
    display:flex;flex-direction:column;gap:14px;
    text-align:center;
  }
  .gate-card h2{font-size:17px;font-weight:800;letter-spacing:-0.01em;}
  .gate-card p{font-size:13px;color:var(--ink-dim);line-height:1.55;text-align:left;}
  .gate-card p b{color:var(--ink);}
  .gate-input{
    width:100%;padding:12px 14px;border-radius:10px;
    background:#08080c;border:1px solid var(--line);color:var(--ink);
    font-size:14px;font-family:inherit;
  }
  .gate-input:focus{outline:none;border-color:#6c7a89;}
  .gate-hint{font-size:10.5px;color:var(--ink-dim);text-align:left;margin-top:-8px;}
  .gate-error{font-size:12px;color:#ff6b6b;min-height:16px;}
  .gate-btn{
    background:var(--ink);color:#0b0b10;border:none;border-radius:10px;
    padding:13px;font-weight:700;font-size:14px;cursor:pointer;
    font-family:inherit;
  }
  .gate-btn:active{transform:scale(0.98);}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <img class="logo" src="./favicon-192.png" alt="">
      <div class="eyebrow">colección</div>
      <h1>Elegí un juego</h1>
      <p class="sub">Prototipos jugables, uno a la vez. Se van sumando acá.</p>
      <div class="whoami-pill" id="whoamiPill" style="display:none;">
        <span>jugando como <b id="whoamiName"></b></span>
        <a id="switchUserLink">cambiar</a>
      </div>
    </header>

    <div class="grid" id="grid"></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   Para sumar un juego nuevo: agregar un objeto a este array.
   No hace falta tocar nada más del archivo.

   id       -> identificador interno (string simple, sin espacios)
   title    -> nombre visible
   tagline  -> una línea, qué se hace en el juego
   meta     -> 1-3 tags cortos (chips)
   url      -> ruta al archivo del juego
   accent   -> color principal (hex), define el glow/borde/chips
   preview  -> 'grid' | 'particles' | 'none'
               (agregar una función nueva en PREVIEWS para otros estilos)
   ============================================================ */
const GAMES = [
  {
    id: 'nodo',
    title: 'NODO',
    tagline: 'Fusioná fichas en la grilla antes de que la presión te gane.',
    meta: ['grid 5×5', 'supervivencia'],
    url: './nodo/',
    accent: '#4fd1c5',
    preview: 'grid',
    // paleta real de tiers 1-7 de NODO, usada por el preview en vez del accent solo
    palette: ['#9fb4d0', '#7fd1c1', '#4fd1c5', '#e0d158', '#e0a458', '#d9634f', '#f06fb0']
  },
  {
    id: 'neon-rush',
    title: 'NEON RUSH',
    tagline: 'Esquivá los picos, cazá los orbes, no perdás el ritmo.',
    meta: ['reflejos', 'arcade'],
    url: './neon-rush/',
    accent: '#00fff0',
    preview: 'particles'
  }
];

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function hexToRgb(hex){
  const n = parseInt(hex.replace('#',''),16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}

/* --- mini previews: cada una dibuja UN frame o loopea con rAF --- */
const PREVIEWS = {
  grid(ctx, w, h, accent, palette){
    const cols = 4, rows = 3;
    const pad = 14;
    const cw = (w - pad*2) / cols, ch = (h - pad*2) / rows;
    let t = 0;
    // celda que "pulsa" (simula fusión) en loop; si hay paleta de tiers, cada
    // celda toma un color de tier real en vez del accent plano
    const cells = [];
    for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
      const [r,g,b] = hexToRgb(palette ? palette[Math.floor(Math.random()*palette.length)] : accent);
      cells.push({x, y, phase: Math.random()*Math.PI*2, r, g, b});
    }

    function frame(){
      ctx.clearRect(0,0,w,h);
      cells.forEach(c=>{
        const pulse = reduceMotion ? 0.5 : (Math.sin(t*0.03 + c.phase)+1)/2;
        const alpha = 0.12 + pulse*0.4;
        const scale = 0.72 + pulse*0.22;
        const cx = pad + c.x*cw + cw/2;
        const cy = pad + c.y*ch + ch/2;
        const size = Math.min(cw,ch)*0.6*scale;
        ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${alpha})`;
        roundRect(ctx, cx-size/2, cy-size/2, size, size, 6);
        ctx.fill();
      });
      t++;
      if(!reduceMotion) requestAnimationFrame(frame);
    }
    frame();
  },

  particles(ctx, w, h, accent){
    const [r,g,b] = hexToRgb(accent);
    const N = 10;
    const parts = Array.from({length:N}, () => ({
      x: Math.random()*w,
      y: Math.random()*h,
      r: 2 + Math.random()*3,
      s: 0.4 + Math.random()*0.9,
      hue: Math.random() > 0.5
    }));
    function frame(){
      ctx.clearRect(0,0,w,h);
      parts.forEach(p=>{
        if(!reduceMotion){
          p.y += p.s;
          if(p.y > h + 10){ p.y = -10; p.x = Math.random()*w; }
        }
        const col = p.hue ? `rgba(${r},${g},${b},0.9)` : `rgba(255,61,154,0.85)`;
        ctx.beginPath();
        ctx.fillStyle = col;
        ctx.shadowColor = col;
        ctx.shadowBlur = 8;
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.shadowBlur = 0;
      if(!reduceMotion) requestAnimationFrame(frame);
    }
    frame();
  },

  none(){}
};

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* --- render de las cards --- */
const grid = document.getElementById('grid');

GAMES.forEach((game, i) => {
  const [r,g,b] = hexToRgb(game.accent);

  const card = document.createElement('a');
  card.href = game.url;
  card.className = 'card';
  card.style.setProperty('--accent', game.accent);
  card.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.28)`);
  card.style.animationDelay = `${0.26 + i*0.06}s`;

  const canvas = document.createElement('canvas');
  canvas.className = 'preview';
  card.appendChild(canvas);

  const body = document.createElement('div');
  body.className = 'body';
  body.innerHTML = `
    <div class="title">${game.title}</div>
    <div class="tagline">${game.tagline}</div>
    <div class="meta">${game.meta.map(m => `<span class="chip">${m}</span>`).join('')}</div>
    <div class="play">jugar
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 5l7 7-7 7"/>
      </svg>
    </div>
  `;
  card.appendChild(body);
  grid.appendChild(card);

  // setup canvas a resolución real + arrancar preview
  const setup = () => {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    (PREVIEWS[game.preview] || PREVIEWS.none)(ctx, rect.width, rect.height, game.accent, game.palette);
  };
  requestAnimationFrame(setup);
});

// ============================================================
// Identidad — se crea acá, una sola vez. Los juegos solo la leen
// desde localStorage (mismo dominio, misma clave) y la validan
// contra el servidor cada vez que entrás a jugar.
// ============================================================
const SUPABASE_URL = 'https://rabnyiyiaxjhfwlqmnfq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhYm55aXlpYXhqaGZ3bHFtbmZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MzMyMDUsImV4cCI6MjA5OTEwOTIwNX0.CwPQV0GINIa_slIqk1DReCFzstdnkeALbaDpsLf8WH0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const ME_KEY = 'site_me';

const params = new URLSearchParams(location.search);
const nextUrl = params.get('next');
const reauth = params.get('reauth') === '1';

const whoamiPill = document.getElementById('whoamiPill');
const whoamiNameEl = document.getElementById('whoamiName');
const switchUserLink = document.getElementById('switchUserLink');

function revealHub(name){
  if(name){
    whoamiNameEl.textContent = name;
    whoamiPill.style.display = 'flex';
  }
  document.documentElement.classList.remove('gate-pending');
}

function showGate(prefillError){
  const overlay = document.createElement('div');
  overlay.className = 'gate-overlay';
  overlay.innerHTML = `
    <div class="gate-card">
      <h2>Ingresá tu nombre y PIN</h2>
      <p><b>¿Ya jugaste antes?</b> Escribí el mismo nombre y PIN que usaste la última vez.<br><br><b>¿Primera vez?</b> Elegí un nombre y un PIN de 4 dígitos — quedan reservados para vos y valen para todos los juegos de acá.</p>
      <input class="gate-input" id="gateName" maxlength="14" placeholder="Tu nombre" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false">
      <input class="gate-input" id="gatePin" maxlength="4" placeholder="PIN · 4 dígitos" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      <div class="gate-hint">Solo números, 4 dígitos.</div>
      <div class="gate-error" id="gateError">${prefillError || ''}</div>
      <button class="gate-btn" id="gateBtn">Entrar</button>
    </div>
  `;
  document.body.appendChild(overlay);
  const nameInput = document.getElementById('gateName');
  const pinInput = document.getElementById('gatePin');
  const errorEl = document.getElementById('gateError');
  nameInput.focus();
  pinInput.addEventListener('input', ()=>{
    pinInput.value = pinInput.value.replace(/[^0-9]/g,'').slice(0,4);
  });

  let submitting = false;
  const confirmEntry = async ()=>{
    if(submitting) return;
    const name = (nameInput.value || '').trim().slice(0,14);
    const pin = pinInput.value.trim();
    if(!name){ errorEl.textContent = 'Poné un nombre.'; return; }
    if(!/^[0-9]{4}$/.test(pin)){ errorEl.textContent = 'El PIN tiene que ser de 4 números.'; return; }

    submitting = true;
    errorEl.textContent = '';
    try{
      const { error } = await sb.rpc('register_or_auth', { p_name: name, p_pin: pin });
      if(error) throw error;
      try{ localStorage.setItem(ME_KEY, JSON.stringify({name, pin})); }catch(e){ /* sigue sin persistir */ }
      overlay.remove();
      if(nextUrl){ location.href = nextUrl; return; }
      revealHub(name);
    }catch(e){
      errorEl.textContent = (e && e.message) ? e.message : 'No se pudo validar. Probá de nuevo.';
    }finally{
      submitting = false;
    }
  };
  document.getElementById('gateBtn').onclick = confirmEntry;
  pinInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') confirmEntry(); });
  nameInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') pinInput.focus(); });
}

async function initIdentity(){
  let stored = null;
  try{
    const raw = localStorage.getItem(ME_KEY);
    if(raw) stored = JSON.parse(raw);
  }catch(e){ /* no había usuario guardado */ }

  if(stored && stored.name && stored.pin){
    try{
      const { error } = await sb.rpc('register_or_auth', { p_name: stored.name, p_pin: stored.pin });
      if(error) throw error;
      if(nextUrl){ location.href = nextUrl; return; }
      revealHub(stored.name);
      return;
    }catch(e){
      try{ localStorage.removeItem(ME_KEY); }catch(e2){}
      showGate('Tu sesión guardada ya no es válida. Iniciá de nuevo.');
      return;
    }
  }
  showGate(reauth ? 'Iniciá sesión de nuevo para seguir jugando.' : null);
}

switchUserLink.addEventListener('click', ()=>{
  try{ localStorage.removeItem(ME_KEY); }catch(e){}
  location.reload();
});

initIdentity();
</script>
</body>
</html>
